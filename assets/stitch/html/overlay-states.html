<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#004881",
                        "on-secondary-fixed-variant": "#93000d",
                        "surface-variant": "#353535",
                        "primary": "#a2c9ff",
                        "secondary-fixed": "#ffdad6",
                        "on-primary-fixed": "#001c38",
                        "secondary-container": "#a90111",
                        "on-secondary": "#690006",
                        "background": "#131313",
                        "on-tertiary-fixed": "#002204",
                        "on-tertiary-fixed-variant": "#005313",
                        "tertiary-container": "#46a34a",
                        "on-tertiary-container": "#003208",
                        "surface-dim": "#131313",
                        "primary-container": "#3394f1",
                        "outline": "#8a919e",
                        "error-container": "#93000a",
                        "on-primary-container": "#002b50",
                        "outline-variant": "#404752",
                        "inverse-surface": "#e5e2e1",
                        "on-error": "#690005",
                        "surface-tint": "#a2c9ff",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary": "#ffb4ac",
                        "surface-container": "#20201f",
                        "surface": "#131313",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#0060a8",
                        "tertiary-fixed-dim": "#7ddc7a",
                        "on-surface": "#e5e2e1",
                        "tertiary": "#7ddc7a",
                        "primary-fixed": "#d3e4ff",
                        "primary-fixed-dim": "#a2c9ff",
                        "inverse-on-surface": "#313030",
                        "on-tertiary": "#00390a",
                        "surface-container-high": "#2a2a2a",
                        "on-secondary-container": "#ffb3ab",
                        "on-background": "#e5e2e1",
                        "error": "#ffb4ab",
                        "surface-container-highest": "#353535",
                        "on-surface-variant": "#c0c7d4",
                        "secondary-fixed-dim": "#ffb4ac",
                        "tertiary-fixed": "#98f994",
                        "on-primary": "#00315b",
                        "on-secondary-fixed": "#410002",
                        "surface-container-low": "#1c1b1b",
                        "surface-bright": "#393939"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .glass-pill {
            background-color: rgba(26, 26, 26, 0.92);
            backdrop-filter: blur(32px);
        }
        .mic-icon-shadow {
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body class="bg-surface-container-lowest font-body text-on-surface min-h-screen flex items-center justify-center p-8 selection:bg-primary/30">
<!-- Desktop Background Simulation Overlay -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=2000&amp;q=80')] bg-cover bg-center opacity-40 blur-3xl" data-alt="abstract flowing liquid digital art with deep blue and purple hues soft lighting and smooth gradients"></div>
<div class="absolute inset-0 bg-black/60"></div>
</div>
<!-- Main Artboard Container -->
<main class="relative z-10 w-full max-w-[1000px] h-[800px] bg-surface-dim/40 backdrop-blur-md rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.6)] flex flex-col items-center justify-center overflow-hidden border border-white/5">
<!-- System Tray Simulation (Top Right) -->
<div class="absolute top-8 right-8 flex gap-3">
<div class="w-8 h-8 rounded-lg bg-surface-container-high flex items-center justify-center shadow-inner group">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant group-hover:text-on-surface transition-colors">mic</span>
</div>
<div class="w-8 h-8 rounded-lg bg-secondary-container flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-[18px] text-white" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<div class="w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-[18px] text-white" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<div class="w-8 h-8 rounded-lg bg-tertiary-container flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-[18px] text-white" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</div>
<!-- Central Stack of Pills -->
<div class="flex flex-col gap-[40px] items-center">
<!-- 1. RECORDING STATE -->
<div class="glass-pill w-[300px] h-[56px] rounded-full flex items-center px-5 border border-white/5 shadow-2xl transition-all duration-300 hover:scale-[1.02]">
<div class="flex items-end gap-1 w-10">
<div class="w-[3px] h-4 bg-secondary rounded-full"></div>
<div class="w-[3px] h-6 bg-secondary rounded-full"></div>
<div class="w-[3px] h-3 bg-secondary rounded-full"></div>
<div class="w-[3px] h-7 bg-secondary rounded-full"></div>
<div class="w-[3px] h-5 bg-secondary rounded-full"></div>
</div>
<div class="ml-auto">
<span class="text-white font-medium tracking-[-0.02em]">Gravando</span>
</div>
</div>
<!-- 2. TRANSCRIBING STATE -->
<div class="glass-pill w-[300px] h-[56px] rounded-full flex items-center px-5 border border-white/5 shadow-2xl transition-all duration-300 hover:scale-[1.02]">
<div class="flex items-center justify-center w-10">
<div class="w-3 h-3 bg-primary rounded-full shadow-[0_0_12px_rgba(162,201,255,0.6)] animate-pulse"></div>
</div>
<div class="ml-auto">
<span class="text-white font-medium tracking-[-0.02em]">Transcrevendo...</span>
</div>
</div>
<!-- 3. DONE STATE -->
<div class="glass-pill w-[300px] h-[56px] rounded-full flex items-center px-5 border border-white/5 shadow-2xl transition-all duration-300 hover:scale-[1.02]">
<div class="flex items-center justify-center w-10">
<span class="material-symbols-outlined text-tertiary-fixed-dim text-[24px]">check_circle</span>
</div>
<div class="ml-4 flex-1 overflow-hidden">
<span class="text-white font-normal tracking-[-0.01em] whitespace-nowrap opacity-90 block truncate">olá, isso é um teste de ditado por voz...</span>
</div>
</div>
<!-- 4. HANDS-FREE LISTENING STATE -->
<div class="glass-pill w-[300px] h-[56px] rounded-full flex items-center px-5 border border-white/5 shadow-2xl transition-all duration-300 hover:scale-[1.02]">
<div class="flex items-end gap-1 w-10">
<div class="w-[3px] h-3 bg-tertiary rounded-full opacity-80"></div>
<div class="w-[3px] h-4 bg-tertiary rounded-full opacity-80"></div>
<div class="w-[3px] h-3 bg-tertiary rounded-full opacity-80"></div>
<div class="w-[3px] h-5 bg-tertiary rounded-full opacity-80"></div>
<div class="w-[3px] h-3 bg-tertiary rounded-full opacity-80"></div>
</div>
<div class="ml-auto">
<span class="text-white font-medium tracking-[-0.02em]">Ouvindo</span>
</div>
</div>
</div>
<!-- Brand Mark (Bottom Corner) -->
<div class="absolute bottom-8 left-8 flex items-center gap-2 opacity-60 hover:opacity-100 transition-opacity">
<span class="text-lg font-bold tracking-tighter text-blue-200">g-whisper</span>
<div class="w-1.5 h-1.5 rounded-full bg-blue-200/50"></div>
<span class="text-[10px] font-medium tracking-[0.05em] uppercase text-zinc-500">v1.4.2</span>
</div>
</main>
<!-- App Shell Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 z-50 flex justify-center pb-safe w-full">
<div class="bg-[#131313]/80 dark:bg-[#131313]/80 backdrop-blur-2xl rounded-full mb-6 mx-auto max-w-fit px-2 py-1.5 shadow-2xl flex items-center gap-1 tonal-shift bg-zinc-800/20">
<button class="flex flex-col items-center justify-center text-zinc-500 px-5 py-2 hover:text-zinc-200 group active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[20px] mb-0.5">history</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-[0.05em] uppercase">History</span>
</button>
<button class="flex flex-col items-center justify-center bg-blue-400/10 text-blue-200 rounded-full px-5 py-2 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[20px] mb-0.5" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-[0.05em] uppercase">Record</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-500 px-5 py-2 hover:text-zinc-200 group active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[20px] mb-0.5">tune</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-[0.05em] uppercase">Settings</span>
</button>
</div>
</nav>
<!-- App Shell Top Bar (Floating Style) -->
<header class="fixed top-4 left-0 right-0 z-50 flex items-center justify-between h-14 w-[320px] mx-auto px-4 bg-zinc-900/60 dark:bg-zinc-900/60 backdrop-blur-[32px] rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.4)] bg-gradient-to-b from-white/10 to-transparent">
<div class="text-lg font-bold tracking-tighter text-blue-200 dark:text-blue-200">g-whisper</div>
<div class="flex items-center gap-3">
<button class="material-symbols-outlined text-zinc-500 hover:bg-white/5 p-1.5 rounded-full transition-all duration-300 active:scale-95">mic</button>
<button class="material-symbols-outlined text-zinc-500 hover:bg-white/5 p-1.5 rounded-full transition-all duration-300 active:scale-95" style="font-variation-settings: 'FILL' 1;">check_circle</button>
<button class="material-symbols-outlined text-zinc-500 hover:bg-white/5 p-1.5 rounded-full transition-all duration-300 active:scale-95">settings</button>
</div>
</header>
</body></html>
